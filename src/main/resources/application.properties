spring.application.name=SmartGuardian

# Database Configuration
# updated to match the running dev container database
# spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/healthapp
spring.datasource.username=secureuser
spring.datasource.password=securepass123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-test-query=SELECT 1
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# Hibernate / JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
smartguardian.app.jwtSecret=${JWT_SECRET}
smartguardian.app.jwtExpirationMs=86400000

# Fitbit
fitbit.client-id=${FITBIT_CLIENT_ID}
fitbit.client-secret=${FITBIT_CLIENT_SECRET}
fitbit.redirect-uri=${FITBIT_REDIRECT_URI}


# ===================== APP =====================
spring.application.name=SmartGuardian

# ===================== DATABASE =====================
# updated to match the running dev container database
#spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
#spring.datasource.username=${DB_USERNAME:secureuser}
#spring.datasource.password=${DB_PASSWORD:securepass123}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-test-query=SELECT 1
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.jdbc=INFO

# ===================== JPA =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================== JWT =====================
smartguardian.app.jwtSecret=${JWT_SECRET:local-dev-secret-key-min-32-chars-long}
smartguardian.app.jwtExpirationMs=86400000

# ===================== FITBIT =====================
fitbit.client-id=${FITBIT_CLIENT_ID:not-set}
fitbit.client-secret=${FITBIT_CLIENT_SECRET:not-set}
fitbit.redirect-uri=${FITBIT_REDIRECT_URI:http://localhost:8080/api/auth/fitbit/callback}

# ===================== PI DEVICE =====================
smartguardian.device.apiKey=${DEVICE_API_KEY:local-dev-device-key}
